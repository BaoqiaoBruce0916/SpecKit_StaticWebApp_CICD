<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Destination Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🌍</span>
                    <h1>Destination Manager</h1>
                </div>
                <p class="tagline">Discover & manage amazing places around the world</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <section class="toolbar">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search destinations by name, location, or category..." />
                </div>
                <div class="toolbar-actions">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="Beach">🏖️ Beach</option>
                        <option value="Mountain">🏔️ Mountain</option>
                        <option value="Historical">🏛️ Historical</option>
                        <option value="City">🏙️ City</option>
                        <option value="Nature">🌿 Nature</option>
                        <option value="Adventure">🧗 Adventure</option>
                        <option value="Cultural">🎭 Cultural</option>
                        <option value="Island">🏝️ Island</option>
                    </select>
                    <button id="addBtn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        Add Destination
                    </button>
                </div>
            </section>

            <!-- Stats Bar -->
            <div class="stats-bar" id="statsBar">
                <span id="statsText">0 destinations found</span>
            </div>

            <!-- Destinations Grid -->
            <section class="destinations-grid" id="destinationsGrid">
                <!-- Cards will be rendered here -->
            </section>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🗺️</div>
                <h2>No destinations yet</h2>
                <p>Start by adding your first tourist destination!</p>
                <button class="btn btn-primary" id="emptyAddBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Add Your First Destination
                </button>
            </div>
        </main>

        <!-- Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Destination</h2>
                    <button class="btn-close" id="closeModalBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="destinationForm" novalidate>
                    <input type="hidden" id="destinationId" />
                    <div class="form-group">
                        <label for="name">Destination Name <span class="required">*</span></label>
                        <input type="text" id="name" placeholder="e.g., Bali, Indonesia" required maxlength="100" />
                        <span class="error-msg" id="nameError"></span>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="location">Location <span class="required">*</span></label>
                            <input type="text" id="location" placeholder="e.g., Southeast Asia" required maxlength="100" />
                            <span class="error-msg" id="locationError"></span>
                        </div>
                        <div class="form-group">
                            <label for="category">Category <span class="required">*</span></label>
                            <select id="category" required>
                                <option value="">Select category</option>
                                <option value="Beach">🏖️ Beach</option>
                                <option value="Mountain">🏔️ Mountain</option>
                                <option value="Historical">🏛️ Historical</option>
                                <option value="City">🏙️ City</option>
                                <option value="Nature">🌿 Nature</option>
                                <option value="Adventure">🧗 Adventure</option>
                                <option value="Cultural">🎭 Cultural</option>
                                <option value="Island">🏝️ Island</option>
                            </select>
                            <span class="error-msg" id="categoryError"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description <span class="required">*</span></label>
                        <textarea id="description" rows="3" placeholder="Describe what makes this destination special..." required maxlength="500"></textarea>
                        <span class="char-count" id="descCount">0/500</span>
                        <span class="error-msg" id="descriptionError"></span>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="rating">Rating</label>
                            <div class="rating-input">
                                <input type="range" id="rating" min="1" max="5" value="4" step="0.5" />
                                <span class="rating-value" id="ratingValue">⭐ 4.0</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="bestSeason">Best Season</label>
                            <select id="bestSeason">
                                <option value="">Any Season</option>
                                <option value="Spring">🌸 Spring</option>
                                <option value="Summer">☀️ Summer</option>
                                <option value="Autumn">🍂 Autumn</option>
                                <option value="Winter">❄️ Winter</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl">Image URL</label>
                        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" />
                        <span class="error-msg" id="imageUrlError"></span>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            Add Destination
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div class="modal-overlay" id="deleteModalOverlay">
            <div class="modal modal-small" id="deleteModal">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <button class="btn-close" id="closeDeleteModalBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="delete-warning">
                        <span class="delete-icon">⚠️</span>
                        <p>Are you sure you want to delete <strong id="deleteItemName"></strong>?</p>
                        <p class="delete-subtext">This action cannot be undone.</p>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14"/>
                        </svg>
                        Delete
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
